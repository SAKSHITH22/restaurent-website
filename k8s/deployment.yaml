apiVersion: apps/v1
kind: Deployment
metadata:
  name: restaurent-website
  labels:
    app: restaurent-website
spec:
  replicas: 2
  selector:
    matchLabels:
      app: restaurent-website
  template:
    metadata:
      labels:
        app: restaurent-website
    spec:
      containers:
        - name: restaurent-website
          image: restaurent-website:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
